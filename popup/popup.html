<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Contact Scraper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#0a66c2">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        <span>Contact Scraper</span>
      </div>
    </header>

    <div id="state-not-linkedin" class="state hidden">
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <p>Navigate to a <strong>LinkedIn profile page</strong> to use this extension.</p>
        <p class="hint">URL must contain <code>linkedin.com/in/</code></p>
      </div>
    </div>

    <div id="state-idle" class="state hidden">
      <p class="intro">Click <strong>Scrape</strong> to extract contact info from this profile.</p>
      <button id="btn-scrape" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Scrape Profile
      </button>
    </div>

    <div id="state-loading" class="state hidden">
      <div class="loading">
        <div class="spinner"></div>
        <span>Extracting contact info…</span>
      </div>
    </div>

    <div id="state-error" class="state hidden">
      <div class="empty-state">
        <div class="empty-icon">❌</div>
        <p id="error-message">Something went wrong.</p>
        <button id="btn-retry" class="btn btn-secondary">Try Again</button>
      </div>
    </div>

    <div id="state-results" class="state hidden">
      <div class="fields" id="fields-container">
        <!-- Populated by popup.js -->
      </div>
      <div class="actions">
        <button id="btn-copy" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copy All
        </button>
        <button id="btn-rescrape" class="btn btn-secondary">Re-scrape</button>
      </div>
      <div id="copy-feedback" class="copy-feedback hidden">Copied to clipboard!</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
